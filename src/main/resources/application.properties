spring.application.name=backend-sound-flow

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}

spring.datasource.url=${POSTGRESQL_SERVER_URL}
spring.datasource.username=${POSTGRESQL_ROOT_USERNAME}
spring.datasource.password=${POSTGRESQL_ROOT_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.config.import=optional:file:./.env[.properties]

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

authorization.token.header.name=Authorization
authorization.token.header.prefix=Bearer 
authorization.token.secret=${JWT_TOKEN_SECRET}
authorization.token.expiration-time=36000000    #10 sati
authorization.refresh-token.expiration-time=2592000000    #30 dana
